moduleMetaData:
  id: "bmb-mod"
  label: "Black Market Bazaar Mod"
  description: "The BMB mod's XML data files — items, weapons, armor, clothes, spells, abilities, effects, units, and base game modifications. XML files in Mods/src/Data/GameCore/ are generated from fragments in /xml."
  keywords:
    - BMB
    - Items
    - Weapons
    - Armor
    - Spells
    - Abilities
    - Clothes
    - GameModifier
  relatedModules:
    - game-data
    - modding-guide

# Note: The XML files referenced below are generated from /xml fragments
# during `npm run build`. Run the build before generating context docs.
documents:
  - description: 'BMB Mod - Overview'
    outputPath: 'modules/bmb-mod/overview.md'
    sources:
      - type: file
        description: 'Mod overview and file inventory'
        sourcePaths: [ ./ ]
        filePattern: "README.md"

  - description: 'BMB Mod - Items & Accessories'
    outputPath: 'modules/bmb-mod/items.md'
    sources:
      - type: file
        description: 'Item definitions (generated from xml/items/)'
        sourcePaths: [ ./ ]
        filePattern: "BMB_Items.xml"

  - description: 'BMB Mod - Weapons'
    outputPath: 'modules/bmb-mod/weapons.md'
    sources:
      - type: file
        description: 'Weapon definitions (generated from xml/weapons/)'
        sourcePaths: [ ./ ]
        filePattern: "BMB_Weapons.xml"

  - description: 'BMB Mod - Armor & Clothes'
    outputPath: 'modules/bmb-mod/armor-clothes.md'
    sources:
      - type: file
        description: 'Armor definitions (generated from xml/armor/)'
        sourcePaths: [ ./ ]
        filePattern: "BMB_Armor.xml"
      - type: file
        description: 'Clothing definitions (generated from xml/clothes/)'
        sourcePaths: [ ./ ]
        filePattern: "BMB_Clothes.xml"

  - description: 'BMB Mod - Spells & Abilities'
    outputPath: 'modules/bmb-mod/spells-abilities.md'
    sources:
      - type: file
        description: 'Spell definitions (generated from xml/spells/)'
        sourcePaths: [ ./ ]
        filePattern: "BMB_Spells.xml"
      - type: file
        description: 'Ability definitions (generated from xml/abilities/)'
        sourcePaths: [ ./ ]
        filePattern: "BMB_Abilities.xml"

  - description: 'BMB Mod - Units, Stats & Effects'
    outputPath: 'modules/bmb-mod/units-stats-effects.md'
    sources:
      - type: file
        description: 'Unit definitions (generated from xml/units/)'
        sourcePaths: [ ./ ]
        filePattern: "BMB_Units.xml"
      - type: file
        description: 'Unit stat definitions (generated from xml/unit-stats/)'
        sourcePaths: [ ./ ]
        filePattern: "BMB_UnitStats.xml"
      - type: file
        description: 'Effect definitions (generated from xml/effects/)'
        sourcePaths: [ ./ ]
        filePattern: "BMB_Effects.xml"

  - description: 'BMB Mod - Base Game Modifications'
    outputPath: 'modules/bmb-mod/core-modifications.md'
    sources:
      - type: file
        description: 'Modifications to base game items (generated from xml/core-items-mods/)'
        sourcePaths: [ ./ ]
        filePattern: "BMB_CoreItemsModifications.xml"
