$schema: 'https://raw.githubusercontent.com/context-hub/generator/refs/heads/main/json-schema.json'

mcp:
  name: "Black Market Bazaar CTX"
  version: "1.0.0"

project:
  path: "."
  alias: "bmb"

import:
  - path: "./docs/game-data/module-context.yaml"
  - path: "./docs/modding-guide/module-context.yaml"
  - path: "./Mods/module-context.yaml"

documents:
  - description: 'Project - Folder Structure'
    outputPath: 'project-folder-structure.md'
    sources:
      - type: tree
        description: 'BMB mod project layout'
        sourcePaths: [ . ]
        filePattern: '*'
        notPath:
          - '.git/'
          - '.idea/'
          - '.context/'
          - 'design/'
          - 'node_modules/'
          - 'docs/agents/plans/'
        renderFormat: ascii
        maxDepth: 5

  - description: 'Project - Overview'
    outputPath: 'project-overview.md'
    sources:
      - type: file
        description: 'Project README'
        sourcePaths: [ . ]
        filePattern: "README.md"
